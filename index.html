"explanation": "对“data_parallelism”服务边界理解不清会导致易错判断。"}, {"source": "model_parallelism", "target": "mistake_dp_mp", "relation": "causes", "explanation": "对“model_parallelism”服务边界理解不清会导致易错判断。"}, {"source": "rq_consistency_latency", "target": "ch03", "relation": "belongs_to", "explanation": "科研问题由“分布式系统核心”延伸。"}, {"source": "consistency", "target": "rq_consistency_latency", "relation": "extends_to", "explanation": "“consistency”可延伸到科研问题“一致性强度、可用性与尾延迟如何联合评估？”。"}, {"source": "raft", "target": "rq_consistency_latency", "relation": "extends_to", "explanation": "“raft”可延伸到科研问题“一致性强度、可用性与尾延迟如何联合评估？”。"}, {"source": "rq_collective_topology", "target": "ch05", "relation": "belongs_to", "explanation": "科研问题由“分布式机器学习导论与数据并行”延伸。"}, {"source": "ring_allreduce", "target": "rq_collective_topology", "relation": "extends_to", "explanation": "“ring_allreduce”可延伸到科研问题“异构网络上的集合通信拓扑如何自适应？”。"}, {"source": "data_parallelism", "target": "rq_collective_topology", "relation": "extends_to", "explanation": "“data_parallelism”可延伸到科研问题“异构网络上的集合通信拓扑如何自适应？”。"}, {"source": "rq_pipeline_schedule", "target": "ch06", "relation": "belongs_to", "explanation": "科研问题由“模型与流水线并行”延伸。"}, {"source": "pipeline_parallelism", "target": "rq_pipeline_schedule", "relation": "extends_to", "explanation": "“pipeline_parallelism”可延伸到科研问题“内存约束下怎样最小化流水线气泡？”。"}, {"source": "pipeline_bubble", "target": "rq_pipeline_schedule", "relation": "extends_to", "explanation": "“pipeline_bubble”可延伸到科研问题“内存约束下怎样最小化流水线气泡？”。"}, {"source": "gradient_checkpointing", "target": "rq_pipeline_schedule", "relation": "extends_to", "explanation": "“gradient_checkpointing”可延伸到科研问题“内存约束下怎样最小化流水线气泡？”。"}, {"source": "rq_llm_slo", "target": "ch08", "relation": "belongs_to", "explanation": "科研问题由“大模型推理与前沿专题”延伸。"}, {"source": "inference_scheduling", "target": "rq_llm_slo", "relation": "extends_to", "explanation": "“inference_scheduling”可延伸到科研问题“未知输出长度下如何进行 SLO 感知推理调度？”。"}, {"source": "continuous_batching", "target": "rq_llm_slo", "relation": "extends_to", "explanation": "“continuous_batching”可延伸到科研问题“未知输出长度下如何进行 SLO 感知推理调度？”。"}, {"source": "kv_cache", "target": "rq_llm_slo", "relation": "extends_to", "explanation": "“kv_cache”可延伸到科研问题“未知输出长度下如何进行 SLO 感知推理调度？”。"}];
const PDF_URL = "course.pdf";
const RELATION_LABELS = {
  belongs_to:"属于", requires:"依赖", explains:"讲解", implements:"实现",
  compares_with:"对比", solves:"解决", causes:"导致", used_in:"应用于",
  tested_by:"由实验测试", validated_by:"由论文验证", extends_to:"延伸为"
};
const TYPE_LABELS = {
  Course:"课程", Chapter:"章节", Concept:"概念", Protocol:"协议",
  Algorithm:"算法", Mechanism:"机制", SystemModule:"系统模块", Problem:"问题",
  Experiment:"实验", Project:"项目", Paper:"论文", ExamPoint:"考点",
  Mistake:"易错点", ResearchQuestion:"科研问题"
};
const byId = new Map(NODES.map(n => [n.id,n]));
let selectedId = "course_nds_ai";
const el = id => document.getElementById(id);
const esc = s => String(s ?? "").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
const list = xs => xs && xs.length ? `<ul>${xs.map(x=>`<li>${esc(byId.get(x)?.title || x)}</li>`).join("")}</ul>` : "<p>暂无</p>";
const relationLabel = e => {
  const source=byId.get(e.source), target=byId.get(e.target);
  if(e.relation==="explains"&&["Course","Chapter"].includes(source?.type)&&target?.type!=="Course") return "包含";
  return RELATION_LABELS[e.relation]||e.relation;
};
const nodeTitleLines = title => {
  const chars=Array.from(String(title)), width=7, maxLines=3, lines=[];
  for(let i=0;i<chars.length&&lines.length<maxLines;i+=width) lines.push(chars.slice(i,i+width).join(""));
  if(chars.length>width*maxLines) lines[maxLines-1]=lines[maxLines-1].slice(0,-1)+"…";
  return lines;
};

function initFilters(){
  [...new Set(NODES.map(n=>n.chapter))].filter(Boolean).forEach(v=>el("chapterFilter").insertAdjacentHTML("beforeend",`<option>${esc(v)}</option>`));
  [...new Set(NODES.map(n=>n.type))].sort().forEach(v=>el("typeFilter").insertAdjacentHTML("beforeend",`<option value="${esc(v)}">${esc(TYPE_LABELS[v]||v)}</option>`));
}
function renderList(){
  const q=el("search").value.trim().toLowerCase(), chapter=el("chapterFilter").value, type=el("typeFilter").value;
  const filtered=NODES.filter(n=>(!chapter||n.chapter===chapter)&&(!type||n.type===type)&&(!q||`${n.id} ${n.title} ${n.summary}`.toLowerCase().includes(q)));
  el("stats").textContent=`显示 ${filtered.length} / ${NODES.length} 个节点 · ${EDGES.length} 条边`;
  el("nodeList").innerHTML=filtered.map(n=>`<button class="node-card ${n.id===selectedId?"active":""}" data-id="${esc(n.id)}"><strong>${esc(n.title)}</strong><small>${esc(TYPE_LABELS[n.type]||n.type)} · ${esc(n.chapter)}</small></button>`).join("")||'<div class="empty">没有匹配节点</div>';
  el("nodeList").querySelectorAll("button").forEach(b=>b.onclick=()=>selectNode(b.dataset.id));
}
function relatedEdges(id){ return EDGES.filter(e=>e.source===id||e.target===id); }
function selectNode(id){ selectedId=id; renderList(); renderDetail(); renderGraph(); }
function openPdf(page=1){
  const safePage=Math.max(1,Number(page)||1), url=`${PDF_URL}#page=${safePage}&zoom=page-width`;
  el("pdfTitle").textContent=`《完全版ppt.pdf》· 第 ${safePage} 页`;
  el("pdfFrame").src=url; el("pdfExternal").href=url; el("pdfModal").classList.add("open");
}
function closePdf(){ el("pdfModal").classList.remove("open"); el("pdfFrame").src="about:blank"; }
function renderDetail(){
  const n=byId.get(selectedId), edges=relatedEdges(selectedId);
  if(!n){ el("detail").innerHTML='<div class="empty">请选择节点</div>'; return; }
  const edgeHtml=edges.map(e=>{ const out=e.source===n.id, other=byId.get(out?e.target:e.source);
    const relation=relationLabel(e);
    const path=out
      ? `<b>本节点</b><span class="relation-tag">${esc(relation)}</span>→ ${esc(other?.title||"")}`
      : `${esc(other?.title||"")}<span class="relation-tag">${esc(relation)}</span>→ <b>本节点</b>`;
    return `<div class="edge-item">${path}<br><small>${esc(e.explanation)}</small></div>`; }).join("");
  el("detail").innerHTML=`<h2>${esc(n.title)}</h2><span class="tag">${esc(TYPE_LABELS[n.type]||n.type)}</span><span class="tag">${esc(n.chapter)}</span>
    <p class="summary">${esc(n.summary)}</p>
    <h3>核心内容</h3>${list(n.key_points)}
    <h3>前置知识</h3>${list(n.prerequisites)}
    <h3>典型考点</h3>${list(n.exam_points)}
    <h3>常见误区</h3>${list(n.common_mistakes)}
    <h3>实验 / 项目 / 论文</h3>${list([...n.experiments,...n.project_mapping,...n.paper_mapping])}
    <h3>研究问题</h3>${list(n.research_questions)}
    <h3>课件页码（点击预览原课件）</h3>
    <div class="page-links">${n.source_pages.length?n.source_pages.map(page=>`<button class="page-button" data-page="${page}">第 ${page} 页</button>`).join(""):"未标注"}</div>
    <h3>直接关系（${edges.length}）</h3>${edgeHtml||"<p>暂无</p>"}`;
  el("detail").querySelectorAll(".page-button").forEach(button=>button.onclick=()=>openPdf(button.dataset.page));
}
function svgEl(name,attrs={}){ const x=document.createElementNS("http://www.w3.org/2000/svg",name); Object.entries(attrs).forEach(([k,v])=>x.setAttribute(k,v)); return x; }
function renderGraph(){
  const svg=el("graph"); svg.innerHTML="";
  const defs=svgEl("defs"), marker=svgEl("marker",{id:"arrow",viewBox:"0 0 10 10",refX:"8",refY:"5",markerWidth:"6",markerHeight:"6",orient:"auto-start-reverse"});
  marker.appendChild(svgEl("path",{d:"M 0 0 L 10 5 L 0 10 z",fill:"#9eb2ad"})); defs.appendChild(marker); svg.appendChild(defs);
  const edgeByNeighbor=new Map();
  relatedEdges(selectedId).forEach(e=>{ const neighbor=e.source===selectedId?e.target:e.source, old=edgeByNeighbor.get(neighbor);
    if(!old||(e.source===selectedId&&old.source!==selectedId)) edgeByNeighbor.set(neighbor,e); });
  const edges=[...edgeByNeighbor.values()].slice(0,18), neighborIds=[...edgeByNeighbor.keys()].slice(0,18);
  const cx=380,cy=310,r=225, positions=new Map([[selectedId,[cx,cy]]]);
  neighborIds.forEach((id,i)=>{ const a=(Math.PI*2*i/Math.max(1,neighborIds.length))-Math.PI/2; positions.set(id,[cx+r*Math.cos(a),cy+r*Math.sin(a)]); });
  edges.forEach(e=>{ const a=positions.get(e.source),b=positions.get(e.target); if(!a||!b)return;
    svg.appendChild(svgEl("line",{x1:a[0],y1:a[1],x2:b[0],y2:b[1],class:"edge-line","marker-end":"url(#arrow)"}));
    const t=svgEl("text",{x:(a[0]+b[0])/2,y:(a[1]+b[1])/2,class:"edge-label"}); t.textContent=relationLabel(e); svg.appendChild(t);
  });
  positions.forEach((p,id)=>{ const n=byId.get(id),g=svgEl("g",{class:`graph-node ${id===selectedId?"center":""}`,transform:`translate(${p[0]},${p[1]})`});
    g.appendChild(svgEl("circle",{r:id===selectedId?55:47})); const text=svgEl("text");
    const lines=nodeTitleLines(n?.title||id), startY=4-(lines.length-1)*6;
    lines.forEach((line,i)=>{ const span=svgEl("tspan",{x:0,y:startY+i*12}); span.textContent=line; text.appendChild(span); });
    g.appendChild(text); g.onclick=()=>selectNode(id); svg.appendChild(g);
  });
}
["search","chapterFilter","typeFilter"].forEach(id=>el(id).addEventListener(id==="search"?"input":"change",renderList));
el("openCourse").onclick=()=>openPdf(1);
el("closePdf").onclick=closePdf;
el("pdfModal").onclick=event=>{ if(event.target===el("pdfModal")) closePdf(); };
document.addEventListener("keydown",event=>{ if(event.key==="Escape") closePdf(); });
initFilters(); renderList(); renderDetail(); renderGraph();
</script>
